# Clapshot Transcoding Script Configuration
#
# This file allows customization of the default transcoding behavior
# without modifying the script itself (which you can do also if needed).
# Common hardware acceleration and codec options are provided below.

# WARNING! Most of these haven't been tested properly. Try them
# if you think they might work, and please report back if they do.


# Video Codec Options
#VIDEO_CODEC=libx264          # Default software encoder
#VIDEO_CODEC=h264_qsv         # Intel Quick Sync Video
#VIDEO_CODEC=h264_nvenc       # NVIDIA NVENC
#VIDEO_CODEC=h264_vaapi       # VA-API (Intel/AMD)
#VIDEO_CODEC=h264_videotoolbox # Apple VideoToolbox (macOS/Apple Silicon)

# Video Encoding Presets
#VIDEO_PRESET=faster          # Default for libx264
#VIDEO_PRESET=fast            # For QSV
#VIDEO_PRESET=p4              # For NVENC (p1=fastest, p7=slowest)

# Audio Codec Options
#AUDIO_CODEC=aac              # Default
#AUDIO_BITRATE=128000         # For video files (bits/sec)
#AUDIO_BITRATE_AUDIO=384k     # For audio-to-video conversion

# Hardware Acceleration Options
#HWACCEL=qsv                  # Hardware acceleration type (qsv, nvenc, vaapi, videotoolbox)
#HWACCEL_DEVICE=/dev/dri/renderD128  # VA-API device (for vaapi)
#VIDEO_FILTER_SCALE=scale_qsv # Hardware-accelerated scaling (scale_qsv, scale_cuda, scale_vaapi)

# Examples for common configurations:

# Intel Quick Sync Video (QSV)
# Uncomment the following lines to enable QSV hardware acceleration:
#VIDEO_CODEC=h264_qsv
#VIDEO_PRESET=fast
#HWACCEL=qsv
#VIDEO_FILTER_SCALE=scale_qsv

# NVIDIA NVENC
# Uncomment for NVIDIA GPU encoding:
#VIDEO_CODEC=h264_nvenc
#VIDEO_PRESET=p4
#HWACCEL=nvenc
#VIDEO_FILTER_SCALE=scale_cuda

# VA-API (Linux Intel/AMD)
# Uncomment for VA-API hardware acceleration:
#VIDEO_CODEC=h264_vaapi
#HWACCEL=vaapi
#HWACCEL_DEVICE=/dev/dri/renderD128
#VIDEO_FILTER_SCALE=scale_vaapi

# Apple VideoToolbox (macOS/Apple Silicon)
# Uncomment for VideoToolbox hardware acceleration on macOS:
#VIDEO_CODEC=h264_videotoolbox
#VIDEO_PRESET=faster
#HWACCEL=videotoolbox
# For H.265/HEVC encoding (more efficient on Apple Silicon):
#VIDEO_CODEC=hevc_videotoolbox
#VIDEO_PRESET=faster
#HWACCEL=videotoolbox
